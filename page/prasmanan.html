<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Order Prasmanan|Warung Sakah Mesari</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../img/logo2.png" />

    <link rel="stylesheet" href="../css/app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script>
      const openForm = document.getElementById("openForm");
      const modal = document.getElementById("modalForm");
      const closeBtn = document.querySelector(".close");

      openForm.onclick = () => (modal.style.display = "flex");
      closeBtn.onclick = () => (modal.style.display = "none");

      window.onclick = (e) => {
        if (e.target === modal) modal.style.display = "none";
      };
    </script>
  </head>
  <body>
    <header class="navbar-container">
      <div class="logo">
        <img src="../img/logo.png" alt="Logo WSM" />
      </div>
      <button class="hamburger-menu" aria-label="Toggle navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <nav class="nav-list">
        <button class="close-menu">X</button>
        <ul>
          <li><a href="../index.html">Beranda</a></li>
          <li><a href="menu.html" class="active">Menu</a></li>
          <li><a href="lokasi.html">Lokasi WSM</a></li>
          <li><a href="kontak.html">Kontak</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <div>
        <li class="back-card mt-4">
          <a href="menu.html" class="back-link"> ← Kembali ke Menu </a>
        </li>
        <section class="services">
          <div class="po">
            <h1><b>Pemesanan Prasmanan</b></h1>
            <p>*Prasmanan khusus untuk nasi kuning dan nasi kotak</p>
          </div>

          <!-- Bagian Form di prasmanan.html -->
          <div class="form-vertikal">
            <div class="form-group">
              <label>Nama Lengkap</label>
              <input
                type="text"
                id="pras_nama"
                placeholder="Masukkan nama lengkap"
                required
              />
            </div>

            <div class="form-group">
              <label>Nomor WhatsApp Anda</label>
              <input
                type="tel"
                id="pras_wa"
                placeholder="08xxxxxxxxxx"
                required
              />
            </div>
            <div class="form-group">
              <label>Pilihan Menu</label>
              <select id="order_menu" required>
                <option value="">-- Pilih Menu --</option>
                <option value="Nasi Kuning">Nasi Kuning</option>
                <option value="Nasi Kotak">Nasi Kotak</option>
              </select>
            </div>

            <div class="form-group">
              <label>Tanggal Acara</label>
              <input type="date" id="pras_tanggal" required />
            </div>

            <div class="form-group">
              <label>Jumlah Porsi</label>
              <input
                type="number"
                id="pras_porsi"
                placeholder="Contoh: 50"
                required
              />
            </div>

            <div class="form-group">
              <label>Alamat Acara</label>
              <textarea
                id="pras_alamat"
                rows="3"
                placeholder="Masukkan alamat lengkap"
                required
              ></textarea>
            </div>

            <button
              type="button"
              onclick="kirimPrasmananWA()"
              class="btn-submit"
            >
              Kirim ke WhatsApp
            </button>
          </div>
        </section>
      </div>
    </main>
    <footer>
      <div class="footer-container">
        <div class="contact-info">
          <h2>Kontak</h2>
          <p>+6281916290686</p>
          <p>WSM@gmail.com</p>
        </div>
        <div class="social-info">
          <h2>Media Sosial</h2>
          <div class="social-links">
            <a href="https://www.facebook.com/sakahmesari"
              ><i class="fab fa-facebook-f"></i
            ></a>
            <a
              href="https://www.instagram.com/sakahmesari?igsh=MXUzd3hic2F2bDEwMA=="
              ><i class="fab fa-instagram"></i
            ></a>
            <a href="https://www.youtube.com/@sakahmesari"
              ><i class="fab fa-youtube"></i
            ></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; Warung Sakah Mesari. All Rights Reserved.</p>
      </div>
    </footer>
    <script src="../js/menu.js"></script>
    <script src="../js/wa_sender.js"></script>
  </body>
</html>
